services:
  web:
    build:
      context: .
    env_file:
      - .env.local

  worker:
    build:
      context: .
    env_file:
      - .env.local

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    env_file:
      - .env.local
    ports:
      - "3000:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

  mailpit:
    image: axllent/mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
    # Port 1025 is SMTP (not exposed to host, accessible within docker net)

volumes:
  caddy_data:
  caddy_config:
