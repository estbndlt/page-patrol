services:
  web:
    image: ${APP_IMAGE}:${APP_TAG}
    pull_policy: always
    env_file:
      - ${PROD_ENV_FILE:-.env.prod}
    ports:
      - "127.0.0.1:8080:8080"

  worker:
    image: ${APP_IMAGE}:${APP_TAG}
    pull_policy: always
    env_file:
      - ${PROD_ENV_FILE:-.env.prod}

  cloudflared:
    image: cloudflare/cloudflared:2026.2.0
    command: ["tunnel", "--metrics", "127.0.0.1:20241", "--no-autoupdate", "run", "--token", "${TUNNEL_TOKEN}"]
    restart: unless-stopped
    network_mode: host
    depends_on:
      - web
