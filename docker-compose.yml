services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: page_patrol
      POSTGRES_USER: page_patrol
      POSTGRES_PASSWORD: page_patrol
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U page_patrol -d page_patrol"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build:
      context: .
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build:
      context: .
    command: ["/app/page-patrol-worker"]
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

  mailpit:
    image: axllent/mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
    # Port 1025 is SMTP (not exposed to host, accessible within docker net)

volumes:
  pg_data:
  caddy_data:
  caddy_config:
