services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: page_patrol
      POSTGRES_USER: page_patrol
      POSTGRES_PASSWORD: page_patrol
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U page_patrol -d page_patrol"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    command: ["/app/page-patrol-worker"]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pg_data:
